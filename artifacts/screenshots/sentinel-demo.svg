<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">SentinelClarity animated terminal demo</title>
  <desc id="desc">Animated terminal-style demonstration of SentinelClarity scanning a vulnerable Clarity DAO contract and producing AI triage findings.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="52%" stop-color="#101827"/>
      <stop offset="100%" stop-color="#182033"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <style>
      .mono { font-family: "Cascadia Code", "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #94a3b8; }
      .text { fill: #e5e7eb; }
      .green { fill: #34d399; }
      .cyan { fill: #22d3ee; }
      .purple { fill: #a78bfa; }
      .yellow { fill: #fbbf24; }
      .red { fill: #fb7185; }
      .line {
        opacity: 0;
        animation: show 16s infinite;
      }
      .cursor {
        animation: blink 1s steps(1) infinite;
      }
      .pulse {
        animation: pulse 2.2s infinite ease-in-out;
      }
      .l1 { animation-delay: 0.8s; }
      .l2 { animation-delay: 1.8s; }
      .l3 { animation-delay: 3.0s; }
      .l4 { animation-delay: 4.4s; }
      .l5 { animation-delay: 5.8s; }
      .l6 { animation-delay: 7.2s; }
      .l7 { animation-delay: 8.6s; }
      .l8 { animation-delay: 10.0s; }
      .l9 { animation-delay: 11.4s; }
      @keyframes show {
        0%, 4% { opacity: 0; transform: translateY(8px); }
        8%, 88% { opacity: 1; transform: translateY(0); }
        96%, 100% { opacity: 0; transform: translateY(-4px); }
      }
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.48; transform: scale(1); }
        50% { opacity: 0.9; transform: scale(1.03); }
      }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle class="pulse" cx="1060" cy="122" r="210" fill="#22d3ee" opacity="0.12"/>
  <circle class="pulse" cx="180" cy="610" r="260" fill="#8b5cf6" opacity="0.10"/>
  <path d="M0 96 C250 42 380 152 620 92 C845 36 1004 78 1280 28 L1280 0 L0 0 Z" fill="#ffffff" opacity="0.035"/>

  <g transform="translate(60 28)">
    <rect x="0" y="0" width="560" height="124" rx="24" fill="#08111f" opacity="0.78"/>
    <text class="sans text" x="24" y="48" font-size="36" font-weight="800">SentinelClarity</text>
    <text class="sans muted" x="24" y="82" font-size="17">AI Security Engineer for Clarity smart contracts</text>
    <rect x="24" y="102" width="286" height="5" rx="2.5" fill="url(#accent)"/>
  </g>

  <g filter="url(#shadow)" transform="translate(84 178)">
    <rect width="1112" height="465" rx="22" fill="#0b1020" stroke="#334155" stroke-width="1.5"/>
    <rect width="1112" height="54" rx="22" fill="#111827"/>
    <path d="M0 32 Q0 0 32 0 H1080 Q1112 0 1112 32 V54 H0 Z" fill="#111827"/>
    <circle cx="32" cy="27" r="7" fill="#fb7185"/>
    <circle cx="56" cy="27" r="7" fill="#fbbf24"/>
    <circle cx="80" cy="27" r="7" fill="#34d399"/>
    <text class="mono muted" x="128" y="34" font-size="16">sentinel-clarity demo</text>

    <g class="mono" font-size="19">
      <text class="line l1" x="38" y="92"><tspan class="green">$</tspan><tspan class="text"> sentinel scan demo/vulnerable-dao.clar --triage</tspan><tspan class="cursor text">▌</tspan></text>
      <text class="line l2 muted" x="38" y="132">Loading rules: REENTRANCY, ACCESS, OVERFLOW, UNCHECKED, READONLY</text>
      <text class="line l3 cyan" x="38" y="172">Parsing Clarity contract and building UniversalAST...</text>
      <text class="line l4 red" x="38" y="218">[CRITICAL] SC-REENTRANCY  external call before treasury update</text>
      <text class="line l5 yellow" x="38" y="258">[HIGH]     SC-ACCESS      admin mutation without owner check</text>
      <text class="line l6 yellow" x="38" y="298">[HIGH]     SC-OVERFLOW    arithmetic requires overflow review</text>
      <text class="line l7 purple" x="38" y="338">[MEDIUM]   SC-UNCHECKED   response lacks explicit handling</text>
      <text class="line l8 cyan" x="38" y="374">AI triage: exploitability, blast radius, root cause, fix strategy</text>
      <text class="line l9 green" x="38" y="430">Report ready: demo-output.md + sentinel-results.sarif</text>
    </g>
  </g>
</svg>
