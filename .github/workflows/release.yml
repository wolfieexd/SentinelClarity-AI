name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  attestations: write
  contents: read
  id-token: write

jobs:
  build:
    name: Build release binary
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: sentinel-clarity-linux-x86_64
            binary: target/release/sentinel-clarity
          - os: macos-latest
            artifact: sentinel-clarity-macos-x86_64
            binary: target/release/sentinel-clarity
          - os: windows-latest
            artifact: sentinel-clarity-windows-x86_64.exe
            binary: target/release/sentinel-clarity.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --locked --release --package sentinel-cli
      - name: Create SHA-256 checksum
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path checksums | Out-Null
          $hash = (Get-FileHash -LiteralPath '${{ matrix.binary }}' -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  ${{ matrix.artifact }}" | Set-Content -NoNewline -Path 'checksums/${{ matrix.artifact }}.sha256'
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.binary }}
            checksums/${{ matrix.artifact }}.sha256
          retention-days: 30
      - name: Attest release binary
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.binary }}
