name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Rust workspace
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: |
          cargo fmt --all --check
      - name: Lint
        run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --locked --workspace
      - name: Build CLI
        run: cargo build --locked --release --package sentinel-cli
      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-clarity-${{ matrix.os }}
          path: target/release/sentinel-clarity*
