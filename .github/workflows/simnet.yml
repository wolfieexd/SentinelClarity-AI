name: Simnet Assurance

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "audit-simnet/**"
      - ".github/workflows/simnet.yml"

permissions:
  contents: read

jobs:
  adversarial-invariants:
    name: Clarinet Simnet invariants
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: audit-simnet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm
          cache-dependency-path: audit-simnet/package-lock.json
      - name: Enable pinned package manager
        run: corepack enable
      - name: Install locked test dependencies
        run: corepack npm ci --ignore-scripts
      - name: Audit test dependencies
        run: corepack npm audit --audit-level=high
      - name: Run adversarial invariants
        run: corepack npm test
