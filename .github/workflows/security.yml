name: Security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Secret pattern scan
        shell: bash
        run: |
          SECRET_PATTERNS=(
            'api[_-]?''key'
            'pass''word[[:space:]]*[:=]'
            'private[_-]?''key'
            'BEGIN (RSA|OPENSSH|PRIVATE)'
            's''k-[A-Za-z0-9]'
            'g''hp_[A-Za-z0-9]'
            'github_''pat_'
            'A''KIA[0-9A-Z]{16}'
            'OPENAI_API_''KEY'
          )

          found_secret=0
          for pattern in "${SECRET_PATTERNS[@]}"; do
            if git grep -n -I -E "$pattern" -- . ':!Cargo.lock'; then
              found_secret=1
            fi
          done

          if [[ "$found_secret" -ne 0 ]]; then
            echo "::error::Potential secret-like material found in tracked files."
            exit 1
          fi
      - name: Smart-contract security regressions
        run: cargo test --locked -p sentinel-test-corpus security_
      - name: Fix verification smoke test
        run: |
          cargo run --locked --package sentinel-cli -- verify-fix \
            --before sentinel-test-corpus/contracts/handcrafted/reentrancy/vulnerable.clar \
            --after sentinel-test-corpus/contracts/handcrafted/reentrancy/fixed.clar \
            --clears SC-REENTRANCY

  dependency-audit:
    name: Dependency advisory audit
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
